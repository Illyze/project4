<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Water Drop Rescue | charity: water</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="d-flex align-items-center justify-content-center min-vh-100 p-2 p-sm-3">

    <div class="game-outer-container text-center">
        <div class="brand-eyebrow">charity: water</div>
        <div class="game-header mb-3">Water Drop Rescue</div>

        <div class="game-board-area mb-3">
            <div class="d-flex justify-content-between align-items-center px-1 mb-3">
                <span class="game-mission-text">Connect the community pipeline</span>
                <div class="game-badge-timer">
                    Timer: <span id="timer-display">00:00</span>
                </div>
            </div>

            <div class="game-grid" id="puzzle-grid"></div>
        </div>

        <div class="row g-2">
            <div class="col-6">
                <button class="btn btn-control btn-restart w-100" onclick="resetGame()">Restart Puzzle</button>
            </div>
            <div class="col-6">
                <button class="btn btn-control btn-home w-100" onclick="goToHome()">Campaign Map</button>
            </div>
        </div>
    </div>

    <div class="win-modal-overlay" id="victory-screen-modal">
        <div class="win-modal-card text-center">
            <div class="win-icon-badge mb-3">
                <i class="bi bi-droplet-fill"></i>
            </div>
            <h2 class="win-title mb-2">Mission Accomplished!</h2>
            <p class="win-subtitle mb-4">You've successfully routed clean, safe water directly to the community tap layout.</p>
            
            <div class="win-stats-box mb-4">
                <span class="stats-label">Delivery Timeline</span>
                <span class="stats-value" id="modal-time-value">00:00</span>
            </div>

            <div class="row g-2">
                <div class="col-6">
                    <button class="btn btn-control btn-restart w-100" onclick="closeWinModal(); resetGame();">Play Again</button>
                </div>
                <div class="col-6">
                    <button class="btn btn-control btn-spring w-100" onclick="window.open('https://www.charitywater.org/thespring', '_blank')">Join The Spring</button>
                </div>
            </div>
        </div>
    </div>

    <div id="source-node" style="display:none;"></div>
    <div id="finish-node" style="display:none;"></div>

    <script src="game.js"></script>
</body>
</html>
